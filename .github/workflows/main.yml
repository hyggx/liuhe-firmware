name: Build & Release

on:
  push:
    branches: ["**"]
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Use the same toolchain version pinned in Dockerfile.toolchain
      - name: Install ARM GNU Toolchain 15.2.Rel1
        run: |
          wget -q "https://developer.arm.com/-/media/Files/downloads/gnu/15.2.rel1/binrel/arm-gnu-toolchain-15.2.rel1-x86_64-arm-none-eabi.tar.xz" \
               -O /tmp/arm-toolchain.tar.xz
          sudo tar -xf /tmp/arm-toolchain.tar.xz -C /opt
          echo "/opt/arm-gnu-toolchain-15.2.rel1-x86_64-arm-none-eabi/bin" >> "$GITHUB_PATH"

      - name: Install Python dependencies
        run: pip install crcmod

      - name: Build (Chinese UI, release profile)
        run: make PROFILE=release ENABLE_CHINESE=1

      - name: Show firmware size
        run: arm-none-eabi-size firmware

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            firmware.packed.bin
            tools/cjk_font.bin

      # ── Release steps — only run on v* tags ──────────────────────────────
      - name: Prepare release assets and notes
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cp firmware.packed.bin "hygg-${VERSION}.packed.bin"
          cp tools/cjk_font.bin  "cjk_font-${VERSION}.bin"

          VER="${VERSION#v}"
          python3 -c "
          import re, sys
          with open('CHANGELOG.md', encoding='utf-8') as f:
              text = f.read().replace('\r\n', '\n')
          v = sys.argv[1]
          m = re.search(r'## \[' + re.escape(v) + r'\][^\n]*\n(.*?)(?=\n## \[)', text, re.DOTALL)
          print(m.group(1).strip() if m else 'See [CHANGELOG.md](./CHANGELOG.md) for details.')
          " "$VER" > release_notes.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Hygg ${{ github.ref_name }}"
          body_path: release_notes.md
          files: |
            hygg-${{ github.ref_name }}.packed.bin
            cjk_font-${{ github.ref_name }}.bin
